<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webpack Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .result-card {
            background-color: #fff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 400px;
        }

        .highlight {
            font-weight: bold;
            color: #007bff;
        }

        .note {
            font-size: 0.9em;
            color: #666;
            margin-top: 1rem;
        }

        code {
            background-color: #eee;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div id="output"></div>
</body>

</html>
